    <script>
        let countdownInterval;
        const wallets = {
            usdt_trc20: 'THu3W4KwS98yAkB4RnmaMxmUr2PD8bRQTx',
            usdt_bep20: '0x33a10d38b547f017b9368d5da7ae865ab1c30b72',
            btc: 'bc1ql7zc5gs5e429f7sh7s8mdglxmx806zjfxt650fj4jngu2prx6d2qcmdhwd',
           
        };




        function startCustomPaymentFlow() {
            document.getElementById('custom-payment-system').classList.remove('hidden-custom');
            document.getElementById('loader-modal').classList.remove('hidden-custom');
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                document.getElementById('loader-modal').classList.add('hidden-custom');
                document.getElementById('crypto-modal').classList.remove('hidden-custom');
if (window.selectedProduct) {
    document.getElementById('payment-amount').innerText =
        '$' + window.selectedProduct.price;
}
const dynamicInput = document.getElementById('dynamic-field');




if (window.selectedProduct) {
    dynamicInput.classList.remove('hidden-custom');




    if (window.selectedProduct.category === "Gaming") {
        dynamicInput.placeholder = "Game ID (Required)";
    }
    else if (window.selectedProduct.category === "TikTok Coins") {
        dynamicInput.placeholder = "TikTok UserName (Required)";

    }
    else {
        dynamicInput.classList.add('hidden-custom');
        dynamicInput.value = '';
    }
}
            }, 1000);
        }




        document.getElementById('crypto-selector')?.addEventListener('change', (e) => {
            const addr = wallets[e.target.value];
            document.getElementById('wallet-address-input').value = addr;
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${addr}`;
        });




        document.getElementById('copy-btn')?.addEventListener('click', function() {
            navigator.clipboard.writeText(document.getElementById('wallet-address-input').value);
            this.classList.add('copied');
            setTimeout(() => this.classList.remove('copied'), 1500);
        });




        function handleVerifyPayment() {
            if (!document.getElementById('pay-email').value || !document.getElementById('pay-screenshot').value) {
                alert("Please fill required fields."); return;
            }
            document.getElementById('crypto-modal').classList.add('hidden-custom');
            document.getElementById('verify-modal').classList.remove('hidden-custom');
            document.getElementById('order-id').innerText = 'ORD-' + Math.floor(100000 + Math.random() * 900000);
            let timer = 300;
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                let mins = Math.floor(timer / 60), secs = timer % 60;
                document.getElementById('timer-display').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (--timer < 0) clearInterval(countdownInterval);
            }, 1000);
        }




        function closePaymentModals() {
            document.getElementById('custom-payment-system').classList.add('hidden-custom');
            document.querySelectorAll('#custom-payment-system > div').forEach(el => el.classList.add('hidden-custom'));
            document.body.style.overflow = 'auto';
            clearInterval(countdownInterval);
        }
    </script>
